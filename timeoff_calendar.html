<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alice.care - Time Off Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #F57600;
    --navy: #1A365C;
    --bg: #E5ECF3;
    --white: #ffffff;
    --border: #D3D7DF;
    --text: #2D3748;
    --muted: #718096;
    --vacation-bg: #D1E9FF;
    --vacation-border: #2B8FD6;
    --vacation-text: #1A4A70;
    --sick-bg: #FFE0D6;
    --sick-border: #E04C20;
    --sick-text: #7A1F05;
    --approved-dot: #22C55E;
    --rejected-dot: #EF4444;
    --pending-dot: #F59E0B;
    --reviewed-dot: #8B5CF6;
  }

  body { font-family: 'Poppins', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }

  .nav { background: var(--white); padding: 14px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 10px rgba(26,54,92,.1); }
  .logo { font-size: 26px; font-weight: 700; }
  .logo .alice { color: var(--orange); }
  .logo .dot { color: var(--orange); }
  .logo .care { color: var(--navy); font-weight: 400; }
  .nav-right { display: flex; align-items: center; gap: 14px; }
  .nav-link { font-size: 13px; color: var(--navy); font-weight: 600; text-decoration: none; padding: 8px 16px; border-radius: 8px; background: var(--bg); transition: background .2s; }
  .nav-link:hover { background: #D0DCE9; }

  .toolbar { max-width: 1400px; margin: 20px auto 0; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; }
  .view-tabs { display: flex; background: var(--white); border-radius: 10px; padding: 4px; box-shadow: 0 2px 8px rgba(26,54,92,.08); }
  .view-tab { padding: 8px 20px; border: none; background: transparent; border-radius: 7px; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all .2s; }
  .view-tab.active { background: var(--navy); color: var(--white); box-shadow: 0 2px 6px rgba(26,54,92,.25); }
  .view-tab:hover:not(.active) { color: var(--navy); }

  .nav-controls { display: flex; align-items: center; gap: 10px; background: var(--white); border-radius: 10px; padding: 6px 14px; box-shadow: 0 2px 8px rgba(26,54,92,.08); }
  .nav-btn { background: none; border: none; cursor: pointer; color: var(--navy); font-size: 18px; padding: 4px 8px; border-radius: 6px; font-family: 'Poppins', sans-serif; font-weight: 700; transition: background .15s; }
  .nav-btn:hover { background: var(--bg); }
  .period-label { font-size: 15px; font-weight: 700; color: var(--navy); min-width: 200px; text-align: center; }
  .today-btn { background: var(--orange); color: var(--white); border: none; border-radius: 7px; font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600; padding: 6px 14px; cursor: pointer; transition: opacity .2s; }
  .today-btn:hover { opacity: .88; }

  .filter-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .filter-row select { padding: 8px 14px; border: 2px solid var(--border); border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 13px; color: var(--navy); background: var(--white); cursor: pointer; font-weight: 500; transition: border-color .2s; }
  .filter-row select:focus { outline: none; border-color: var(--orange); }

  .legend { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--muted); }
  .legend-chip { width: 28px; height: 14px; border-radius: 4px; border-left: 3px solid transparent; }
  .legend-chip.vacation { background: var(--vacation-bg); border-color: var(--vacation-border); }
  .legend-chip.sick { background: var(--sick-bg); border-color: var(--sick-border); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .legend-dot.approved { background: var(--approved-dot); }
  .legend-dot.rejected { background: var(--rejected-dot); }
  .legend-dot.pending  { background: var(--pending-dot); }
  .legend-dot.reviewed { background: var(--reviewed-dot); }

  .cal-wrap { max-width: 1400px; margin: 16px auto 30px; padding: 0 20px; }
  .cal-card { background: var(--white); border-radius: 14px; box-shadow: 0 4px 20px rgba(26,54,92,.12); overflow: hidden; }

  /* MONTH */
  .month-grid { display: grid; grid-template-columns: 38px repeat(7, 1fr); }
  .month-header-cell { background: var(--navy); color: var(--white); text-align: center; padding: 12px 0; font-size: 12px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
  .month-wk-header { background: var(--navy); color: rgba(255,255,255,.35); text-align: center; padding: 12px 0; font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .month-wk-cell { background: #F0F4F9; border-right: 2px solid #C8D4E3; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: center; padding-top: 9px; }
  .wk-num { font-size: 10px; font-weight: 700; color: #8A9BB5; letter-spacing: .02em; line-height: 1; }
  .month-day { min-height: 110px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 8px 6px 6px; background: var(--white); }
  .month-day:nth-child(8n) { border-right: none; }
  .month-day.other-month { background: #F7F9FC; }
  .day-num { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 4px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .month-day.today .day-num { background: var(--orange); color: var(--white); }
  .other-month .day-num { color: #C0CADB; }
  .event-chip { display: flex; align-items: center; gap: 4px; padding: 3px 6px; border-radius: 4px; font-size: 10.5px; font-weight: 600; margin-bottom: 2px; cursor: pointer; border-left: 3px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity .15s, transform .15s; }
  .event-chip:hover { opacity: .85; transform: translateX(1px); }
  .event-chip.vacation { background: var(--vacation-bg); border-color: var(--vacation-border); color: var(--vacation-text); }
  .event-chip.sick { background: var(--sick-bg); border-color: var(--sick-border); color: var(--sick-text); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.approved { background: var(--approved-dot); }
  .status-dot.rejected { background: var(--rejected-dot); }
  .status-dot.pending  { background: var(--pending-dot); }
  .status-dot.reviewed { background: var(--reviewed-dot); }
  .more-chip { font-size: 10px; color: var(--muted); font-weight: 600; padding: 2px 4px; cursor: pointer; text-decoration: underline; }

  /* WEEK */
  .week-grid { display: grid; grid-template-columns: 38px 80px repeat(7, 1fr); }
  .week-wk-header { background: var(--navy); color: rgba(255,255,255,.35); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; border-bottom: 2px solid rgba(255,255,255,.15); }
  .week-wk-num { background: #F0F4F9; border-right: 2px solid #C8D4E3; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 10px; gap: 2px; }
  .week-wk-num .wk-num { font-size: 10px; font-weight: 700; color: #8A9BB5; }
  .week-wk-num .wk-label { font-size: 8px; font-weight: 600; color: #B0BDCF; text-transform: uppercase; letter-spacing: .04em; }
  .week-col-header { background: var(--navy); color: var(--white); text-align: center; padding: 14px 4px; font-size: 12px; font-weight: 600; }
  .week-col-header.today-col { background: var(--orange); }
  .week-col-header .wday { font-size: 11px; opacity: .8; text-transform: uppercase; letter-spacing: .05em; }
  .week-col-header .wdate { font-size: 22px; font-weight: 700; line-height: 1.1; }
  .week-allday-label { display: flex; align-items: center; justify-content: flex-end; padding: 0 8px; font-size: 10px; color: var(--muted); font-weight: 600; background: #F7F9FC; border-bottom: 2px solid var(--border); min-height: 50px; border-right: 1px solid var(--border); }
  .week-allday-row { background: #F7F9FC; border-bottom: 2px solid var(--border); min-height: 50px; display: flex; flex-direction: column; gap: 3px; padding: 5px 4px; }

  /* DAY */
  .day-view-wrap { display: grid; grid-template-columns: 1fr; }
  .day-header { background: var(--navy); color: var(--white); padding: 20px 24px; display: flex; align-items: center; gap: 16px; }
  .day-header .big-date { font-size: 44px; font-weight: 700; color: var(--orange); line-height: 1; }
  .day-header .day-meta { display: flex; flex-direction: column; }
  .day-header .day-name { font-size: 18px; font-weight: 600; }
  .day-header .day-month { font-size: 14px; opacity: .75; }
  .day-events-panel { padding: 20px 24px; }
  .day-event-card { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid transparent; cursor: pointer; transition: box-shadow .15s, transform .15s; }
  .day-event-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.1); transform: translateY(-1px); }
  .day-event-card.vacation { background: var(--vacation-bg); border-color: var(--vacation-border); }
  .day-event-card.sick { background: var(--sick-bg); border-color: var(--sick-border); }
  .day-event-icon { font-size: 24px; }
  .day-event-info { flex: 1; }
  .day-event-name { font-size: 15px; font-weight: 700; color: var(--navy); }
  .day-event-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .day-event-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-top: 4px; }
  .day-event-badge.approved { background: #DCFCE7; color: #166534; }
  .day-event-badge.rejected { background: #FEE2E2; color: #991B1B; }
  .day-event-badge.pending  { background: #FEF3C7; color: #92400E; }
  .day-event-badge.reviewed { background: #EDE9FE; color: #5B21B6; }
  .no-events { text-align: center; padding: 60px 20px; color: var(--muted); }
  .no-events .icon { font-size: 48px; margin-bottom: 12px; }
  .no-events p { font-size: 15px; font-weight: 500; }

  /* COUNT STRIP */
  .count-strip { background: var(--navy); color: var(--white); padding: 10px 20px; display: flex; gap: 24px; font-size: 12px; font-weight: 500; flex-wrap: wrap; }
  .count-strip span { opacity: .8; }
  .count-strip strong { opacity: 1; }

  /* ============ DETAIL MODAL ============ */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 16px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 70px rgba(0,0,0,.3); animation: slideUp .2s ease; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-head { padding: 20px 22px 16px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); }
  .modal-head h3 { font-size: 17px; font-weight: 700; color: var(--navy); }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); line-height: 1; padding: 2px 6px; border-radius: 4px; }
  .modal-close:hover { color: var(--navy); background: var(--bg); }

  .modal-body { padding: 18px 22px; }
  .modal-field { margin-bottom: 12px; }
  .modal-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
  .modal-value { font-size: 14px; font-weight: 500; color: var(--text); }

  .type-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .type-badge.vacation { background: var(--vacation-bg); color: var(--vacation-text); }
  .type-badge.sick { background: var(--sick-bg); color: var(--sick-text); }
  .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .status-badge.approved { background: #DCFCE7; color: #166534; }
  .status-badge.rejected { background: #FEE2E2; color: #991B1B; }
  .status-badge.pending  { background: #FEF3C7; color: #92400E; }
  .status-badge.reviewed { background: #EDE9FE; color: #5B21B6; }

  /* ACTION ZONE */
  .action-zone { margin-top: 16px; border-top: 2px solid var(--bg); padding-top: 16px; }
  .action-zone-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 12px; }

  /* QUICK ACTION (combined) */
  .quick-action-card { border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .quick-action-card.approve-card { background: #F0FDF4; border: 2px solid #86EFAC; }
  .quick-action-card.reject-card  { background: #FFF5F5; border: 2px solid #FCA5A5; }
  .quick-action-label { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .quick-action-label .qa-icon { font-size: 16px; }
  .qa-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: var(--orange); color: #fff; letter-spacing: .04em; vertical-align: middle; }

  .form-group input, .form-group textarea {
    padding: 8px 12px; border: 2px solid var(--border); border-radius: 8px;
    font-family: 'Poppins', sans-serif; font-size: 13px; color: var(--text);
    transition: border-color .2s; resize: vertical;
    width: 100%; min-width: 0; max-width: 100%; box-sizing: border-box;
    -webkit-appearance: none; appearance: none;
  }
  .form-group input[type=number] { -moz-appearance: textfield; }
  .form-group input[type=number]::-webkit-inner-spin-button,
  .form-group input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--orange); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; min-width: 0; }
  .form-row > * { min-width: 0; }
  .form-row.single { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .form-group label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

  .btn-row { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
  .btn-qa {
    padding: 9px 20px; border: none; border-radius: 8px; font-family: 'Poppins', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-qa.approve { background: #16A34A; color: #fff; }
  .btn-qa.approve:hover { background: #15803D; }
  .btn-qa.reject  { background: #DC2626; color: #fff; }
  .btn-qa.reject:hover  { background: #B91C1C; }
  .btn-qa.secondary { background: var(--bg); color: var(--navy); }
  .btn-qa.secondary:hover { background: #D0DCE9; }

  /* individual smaller actions */
  .individual-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .btn-ind {
    padding: 7px 14px; border: 2px solid transparent; border-radius: 8px; font-family: 'Poppins', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .btn-ind.review  { border-color: #F59E0B; color: #92400E; background: #FEF3C7; }
  .btn-ind.review:hover  { background: #FDE68A; }
  .btn-ind.approve { border-color: #22C55E; color: #166534; background: #DCFCE7; }
  .btn-ind.approve:hover { background: #BBF7D0; }
  .btn-ind.reject  { border-color: #EF4444; color: #991B1B; background: #FEE2E2; }
  .btn-ind.reject:hover  { background: #FECACA; }

  /* spinner */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* toast */
  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--navy); color: #fff; padding: 14px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 9999; box-shadow: 0 8px 30px rgba(0,0,0,.25); animation: toastIn .3s ease; display: flex; align-items: center; gap: 10px; }
  .toast.success { border-left: 4px solid var(--approved-dot); }
  .toast.error   { border-left: 4px solid var(--rejected-dot); }
  @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body>

<div class="nav">
  <div class="logo"><span class="alice">alice</span><span class="dot">.</span><span class="care">care</span></div>
  <div class="nav-right">
    <span id="syncIndicator" style="font-size:11px;font-weight:600;color:#F59E0B;padding:5px 10px;background:var(--bg);border-radius:6px;cursor:pointer;" onclick="loadLiveStatuses()" title="Click to refresh statuses">⟳ Syncing...</span>
    <a class="nav-link" href="https://alicecare2032.github.io/alice-care-timeoff/hr_dashboard.html">&#8592; HR Dashboard (List View)</a>
    <span style="font-size:13px;color:var(--muted);font-weight:500;">Time Off Calendar</span>
  </div>
</div>

<div class="toolbar">
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <div class="view-tabs">
      <button class="view-tab active" onclick="setView('month')">Month</button>
      <button class="view-tab" onclick="setView('week')">Week</button>
      <button class="view-tab" onclick="setView('day')">Day</button>
    </div>
    <div class="nav-controls">
      <button class="nav-btn" onclick="navBack()">&#8249;</button>
      <span class="period-label" id="periodLabel"></span>
      <button class="nav-btn" onclick="navForward()">&#8250;</button>
    </div>
    <button class="today-btn" onclick="goToday()">Today</button>
  </div>
  <div class="filter-row">
    <select id="empFilter" onchange="render()"><option value="">All Employees</option></select>
    <select id="typeFilter" onchange="render()">
      <option value="">All Types</option>
      <option value="vacation">Vacation</option>
      <option value="sick">Sick</option>
    </select>
    <select id="statusFilter" onchange="render()">
      <option value="">All Statuses</option>
      <option value="approved">Approved</option>
      <option value="rejected">Rejected</option>
      <option value="pending">Pending</option>
    </select>
    <div class="legend">
      <div class="legend-item"><div class="legend-chip vacation"></div>Vacation</div>
      <div class="legend-item"><div class="legend-chip sick"></div>Sick</div>
      <div class="legend-item"><div class="legend-dot approved"></div>Approved</div>
      <div class="legend-item"><div class="legend-dot reviewed"></div>Reviewed</div>
      <div class="legend-item"><div class="legend-dot pending"></div>Pending</div>
      <div class="legend-item"><div class="legend-dot rejected"></div>Rejected</div>
    </div>
  </div>
</div>

<div class="cal-wrap">
  <div class="cal-card" id="calCard"></div>
</div>

<!-- DETAIL + ACTION MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Request Detail</h3>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

// local status overrides — populated by live fetch + optimistic updates
const localStatus = {};
const pinnedStatus = {}; // user-confirmed actions — never overwritten by live fetch
let liveLoaded = false;

// Normalize any date string to YYYY-MM-DD
function toISODate(raw) {
  if (!raw) return '';
  const s = String(raw).trim();
  // Already ISO: 2026-06-09
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  // M/D/YYYY or MM/DD/YYYY
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  // Try JS Date parse as last resort
  const d = new Date(s);
  if (!isNaN(d)) return d.toISOString().slice(0, 10);
  return '';
}

// ---- LIVE STATUS SYNC ----
function loadLiveStatuses(afterAction) {
  const indicator = document.getElementById('syncIndicator');
  if (indicator) { indicator.textContent = '⟳ Syncing...'; indicator.style.color = '#F59E0B'; }

  fetch(SCRIPT_URL)
    .then(r => r.text())                          // GAS needs text(), not json()
    .then(text => {
      let data;
      try { data = JSON.parse(text); } catch(e) {
        throw new Error('JSON parse failed: ' + text.slice(0, 120));
      }

      if (!data.success) throw new Error(data.error || 'GAS returned success:false');

      const requests = data.requests || [];
      let updatedCount = 0;

      requests.forEach(req => {
        const id   = req.requestId || '';
        const date = toISODate(req.requestDate || req.date || '');
        if (!id || !date) return;

        const key = id + '|' + date;

        let status = 'pending';
        if ((req.rejectionStatus || '').toLowerCase() === 'rejected') status = 'rejected';
        else if ((req.approvalStatus || '').toLowerCase() === 'approved') status = 'approved';
        else if ((req.reviewStatus  || '').toLowerCase() === 'reviewed')  status = 'reviewed';

        // Pinned (user just acted) — never overwrite
        if (pinnedStatus[key]) return;

        if (localStatus[key] !== status) updatedCount++;
        localStatus[key] = status;
      });

      liveLoaded = true;
      if (indicator) {
        indicator.textContent = afterAction
          ? `● Confirmed (${new Date().toLocaleTimeString()})`
          : '● Live';
        indicator.style.color = '#22C55E';
      }
      render();
    })
    .catch(err => {
      console.warn('loadLiveStatuses failed:', err);
      if (indicator) { indicator.textContent = '● Cached data'; indicator.style.color = '#F59E0B'; }
    });
}

})();

// ---- HELPERS ----
function isoWeek(d) {
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const startOfWeek1 = new Date(jan4);
  startOfWeek1.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
  const diff = d - startOfWeek1;
  const week = Math.floor(diff / (7 * 24 * 60 * 60 * 1000)) + 1;
  if (week < 1) {
    const dec28 = new Date(d.getFullYear() - 1, 11, 28);
    return isoWeek(dec28);
  }
  const dec28 = new Date(d.getFullYear(), 11, 28);
  if (d > dec28) {
    const nextJan4 = new Date(d.getFullYear() + 1, 0, 4);
    const nextStart = new Date(nextJan4);
    nextStart.setDate(nextJan4.getDate() - ((nextJan4.getDay() + 6) % 7));
    if (d >= nextStart) return 1;
  }
  return week;
}

function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isSameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

function getStatus(ev) {
  const key = ev.id + '|' + ev.date;
  return pinnedStatus[key] || localStatus[key] || ev.status;
}

function filtered() {
  const emp = document.getElementById('empFilter').value;
  const type = document.getElementById('typeFilter').value;
  const stat = document.getElementById('statusFilter').value;
  return RAW.filter(e => {
    const st = getStatus(e);
    return (!emp||e.name===emp) && (!type||e.type===type) && (!stat||st===stat);
  });
}

function eventsOnDate(ds) { return filtered().filter(e=>e.date===ds); }

// ---- CHIP ----
function chipHTML(ev, short) {
  const st = getStatus(ev);
  const name = short ? ev.name.split(' ')[0] : ev.name;
  const icon = ev.type==='vacation' ? '☀' : '🤒';
  return `<div class="event-chip ${ev.type}" onclick="showModal('${ev.id}','${ev.date}')">
    <span class="status-dot ${st}"></span>${icon} ${name}
  </div>`;
}

// ---- MONTH ----
function renderMonth() {
  const yr=cursor.getFullYear(), mo=cursor.getMonth();
  document.getElementById('periodLabel').textContent=`${MONTHS[mo]} ${yr}`;
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const daysInPrev=new Date(yr,mo,0).getDate();
  let cells=[];
  for(let i=0;i<firstDay;i++) cells.push({date:new Date(yr,mo-1,daysInPrev-firstDay+1+i),other:true});
  for(let i=1;i<=daysInMonth;i++) cells.push({date:new Date(yr,mo,i),other:false});
  while(cells.length%7!==0){const l=cells[cells.length-1].date;cells.push({date:new Date(l.getFullYear(),l.getMonth(),l.getDate()+1),other:true});}
  let html='<div class="month-grid"><div class="month-wk-header">Wk</div>';
  DAYS_SHORT.forEach(d=>{html+=`<div class="month-header-cell">${d}</div>`;});
  cells.forEach((cell,idx)=>{
    // insert week number cell at start of each row
    if(idx%7===0){
      const wk=isoWeek(cell.date);
      html+=`<div class="month-wk-cell"><span class="wk-num">${wk}</span></div>`;
    }
    const ds=dateStr(cell.date), evs=eventsOnDate(ds), isT=isSameDay(cell.date,today);
    const cls=['month-day',cell.other?'other-month':'',isT?'today':''].filter(Boolean).join(' ');
    const numStyle=isT?'background:var(--orange);color:#fff;':'';
    let evHTML='';
    evs.slice(0,3).forEach(ev=>{evHTML+=chipHTML(ev,true);});
    if(evs.length>3) evHTML+=`<div class="more-chip" onclick="goDay('${ds}')">+${evs.length-3} more</div>`;
    html+=`<div class="${cls}"><div class="day-num" style="${numStyle}">${cell.date.getDate()}</div>${evHTML}</div>`;
  });
  html+='</div>';
  const inView=filtered().filter(e=>{const d=new Date(e.date+'T00:00:00');return d.getFullYear()===yr&&d.getMonth()===mo;});
  return countStrip(inView)+html;
}

// ---- WEEK ----
function getWeekStart(d){const s=new Date(d);s.setDate(s.getDate()-s.getDay());s.setHours(0,0,0,0);return s;}
function renderWeek() {
  const ws=getWeekStart(cursor), we=new Date(ws); we.setDate(we.getDate()+6);
  const fmt=d=>`${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`;
  document.getElementById('periodLabel').textContent=`${fmt(ws)} - ${fmt(we)}, ${we.getFullYear()}`;
  let days=[]; for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);days.push(d);}
  const wkNum = isoWeek(ws);
  let html=`<div class="week-grid"><div class="week-wk-header">Wk</div><div style="background:var(--navy);border-bottom:2px solid rgba(255,255,255,.15);"></div>`;
  days.forEach(d=>{
    const isT=isSameDay(d,today);
    html+=`<div class="week-col-header${isT?' today-col':''}"><div class="wday">${DAYS_SHORT[d.getDay()]}</div><div class="wdate">${d.getDate()}</div></div>`;
  });
  html+=`<div class="week-wk-num"><span class="wk-num">${wkNum}</span><span class="wk-label">week</span></div>`;
  html+='<div class="week-allday-label">All Day</div>';
  days.forEach(d=>{
    const evs=eventsOnDate(dateStr(d));
    html+='<div class="week-allday-row">';
    evs.forEach(ev=>{html+=chipHTML(ev,false);});
    if(!evs.length) html+='<div style="height:20px;"></div>';
    html+='</div>';
  });  html+='</div>';
  const ws2=dateStr(ws),we2=dateStr(we);
  const inView=filtered().filter(e=>e.date>=ws2&&e.date<=we2);
  return countStrip(inView)+html;
}

// ---- DAY ----
function renderDay() {
  const ds=dateStr(cursor);
  const dayName=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][cursor.getDay()];
  document.getElementById('periodLabel').textContent=`${dayName}, ${MONTHS[cursor.getMonth()]} ${cursor.getDate()}, ${cursor.getFullYear()}`;
  const evs=eventsOnDate(ds);
  const wkNum = isoWeek(cursor);
  let html=`<div class="day-view-wrap"><div class="day-header"><div class="big-date">${cursor.getDate()}</div><div class="day-meta"><div class="day-name">${dayName}</div><div class="day-month">${MONTHS[cursor.getMonth()]} ${cursor.getFullYear()}</div></div><div style="margin-left:auto;text-align:center;background:rgba(255,255,255,.1);border-radius:10px;padding:8px 16px;"><div style="font-size:10px;font-weight:600;opacity:.6;text-transform:uppercase;letter-spacing:.06em;">Week</div><div style="font-size:28px;font-weight:700;color:var(--orange);line-height:1;">${wkNum}</div></div></div><div class="day-events-panel">`;
  if(!evs.length){html+=`<div class="no-events"><div class="icon">📅</div><p>No time off requests on this day.</p></div>`;}
  else {
    evs.forEach(ev=>{
      const st=getStatus(ev);
      html+=`<div class="day-event-card ${ev.type}" onclick="showModal('${ev.id}','${ev.date}')">
        <div class="day-event-icon">${ev.type==='vacation'?'☀️':'🤒'}</div>
        <div class="day-event-info">
          <div class="day-event-name">${ev.name}</div>
          <div class="day-event-meta">${ev.type.charAt(0).toUpperCase()+ev.type.slice(1)} &middot; ${ev.hours} hrs</div>
          <div class="day-event-badge ${st}"><span class="legend-dot ${st}" style="width:8px;height:8px;display:inline-block;border-radius:50%;"></span>${cap(st)}</div>
        </div>
      </div>`;
    });
  }
  html+='</div></div>';
  return countStrip(evs)+html;
}

function countStrip(evs) {
  const vac=evs.filter(e=>e.type==='vacation').length, sick=evs.filter(e=>e.type==='sick').length;
  const appr=evs.filter(e=>getStatus(e)==='approved').length;
  const revd=evs.filter(e=>getStatus(e)==='reviewed').length;
  const pend=evs.filter(e=>getStatus(e)==='pending').length;
  const rej =evs.filter(e=>getStatus(e)==='rejected').length;
  return `<div class="count-strip">
    <span>Showing: <strong>${evs.length} requests</strong></span>
    <span>&#9788; Vacation: <strong>${vac}</strong></span><span>🤒 Sick: <strong>${sick}</strong></span>
    <span style="color:#86efac">&#9679; Approved: <strong>${appr}</strong></span>
    <span style="color:#d8b4fe">&#9679; Reviewed: <strong>${revd}</strong></span>
    <span style="color:#fde68a">&#9679; Pending: <strong>${pend}</strong></span>
    <span style="color:#fca5a5">&#9679; Rejected: <strong>${rej}</strong></span>
  </div>`;
}

function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

// ---- QUICK APPROVE (review + approve, two POSTs) ----
function quickApprove(id, date, defaultHours) {
  const name = document.getElementById('qa_name_a').value.trim();
  const hours = parseFloat(document.getElementById('qa_hours_a').value);
  const comments = document.getElementById('qa_comments_a').value.trim();
  if (!name) { toast('Please enter your name.', 'error'); return; }
  if (isNaN(hours) || hours < 0) { toast('Please enter valid approved hours.', 'error'); return; }
  if (!comments) { toast('Please enter comments.', 'error'); return; }

  const btn = document.getElementById('btn_approve_'+id);
  setLoading(btn, true, 'Submitting...');

  const key = id + '|' + date;
  const now = new Date().toISOString();
  const reviewPayload  = { action:'review',  requestId:id, reviewerName:name, reviewedDate:now, reviewComments:comments };
  const approvePayload = { action:'approve', requestId:id, approverName:name, approvedDate:now, approvedHours:hours, approvalComments:comments };

  // Pin immediately — survives any subsequent live fetch
  pinnedStatus[key] = 'approved';
  localStatus[key]  = 'approved';
  closeModal();
  render();
  toast('Reviewed & Approved — syncing to Google Sheets...', 'success');

  postToScript(reviewPayload)
    .then(() => postToScript(approvePayload))
    .finally(() => {
      // Re-fetch after 3s to confirm the sheet updated
      setTimeout(() => loadLiveStatuses(true), 3000);
    });
}

// ---- QUICK REJECT (review + reject, two POSTs) ----
function quickReject(id, date) {
  const name = document.getElementById('qa_name_r').value.trim();
  const reason = document.getElementById('qa_reason_r').value.trim();
  if (!name) { toast('Please enter your name.', 'error'); return; }
  if (!reason) { toast('Please enter a rejection reason.', 'error'); return; }

  const key = id + '|' + date;
  const now = new Date().toISOString();
  const reviewPayload = { action:'review', requestId:id, reviewerName:name, reviewedDate:now, reviewComments:reason };
  const rejectPayload  = { action:'reject',  requestId:id, rejectorName:name, rejectedDate:now, rejectionComments:reason };

  // Pin immediately
  pinnedStatus[key] = 'rejected';
  localStatus[key]  = 'rejected';
  closeModal();
  render();
  toast('Reviewed & Rejected — syncing to Google Sheets...', 'success');

  postToScript(reviewPayload)
    .then(() => postToScript(rejectPayload))
    .finally(() => {
      setTimeout(() => loadLiveStatuses(true), 3000);
    });
}

// ---- API ----
function postToScript(data) {
  return fetch(SCRIPT_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
}

function setLoading(btn, on, label) {
  if (!btn) return;
  btn.disabled = on;
  btn.innerHTML = on ? `<span class="spinner"></span> ${label}` : btn.dataset.orig || btn.innerHTML;
  if (!on) btn.innerHTML = btn.dataset.orig;
}

// ---- TOAST ----
function toast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `${type==='success'?'&#10003;':'&#9888;'} ${msg}`;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .4s'; setTimeout(()=>t.remove(),400); }, 3500);
}

// ---- NAVIGATION ----
function setView(v) {
  view=v;
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.toggle('active',t.textContent.toLowerCase()===v));
  render();
}
function navBack(){if(view==='month')cursor.setMonth(cursor.getMonth()-1);else if(view==='week')cursor.setDate(cursor.getDate()-7);else cursor.setDate(cursor.getDate()-1);render();}
function navForward(){if(view==='month')cursor.setMonth(cursor.getMonth()+1);else if(view==='week')cursor.setDate(cursor.getDate()+7);else cursor.setDate(cursor.getDate()+1);render();}
function goToday(){cursor=new Date(today);render();}
function goDay(ds){cursor=new Date(ds+'T00:00:00');setView('day');}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function overlayClick(e){ if(e.target===document.getElementById('modalOverlay')) closeModal(); }
document.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft')navBack(); if(e.key==='ArrowRight')navForward(); if(e.key==='Escape')closeModal(); });

function render(){
  let html='';
  if(view==='month') html=renderMonth();
  else if(view==='week') html=renderWeek();
  else html=renderDay();
  document.getElementById('calCard').innerHTML=html;
}

render();          // paint immediately with embedded data
loadLiveStatuses(); // then fetch live statuses and repaint
</script>
</body>
</html>
